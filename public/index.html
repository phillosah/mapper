<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapper</title>
  <!-- Leaflet CSS — required for map tiles and controls to render correctly -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Full-height column layout: main row on top, log bar at the bottom */
    body { display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
    #main { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.22s ease;
      overflow: hidden;
    }
    #sidebar.collapsed { width: 36px; }

    /* Header row: title + toggle button */
    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 16px;
      min-height: 48px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    #sidebar-title {
      font-size: 1.1rem;
      color: #89b4fa;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
    }
    #sidebar-title .version {
      font-size: 0.65rem;
      color: #6c7086;
      margin-left: 6px;
      vertical-align: middle;
    }
    #toggle-btn {
      background: none;
      border: none;
      color: #6c7086;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 4px 2px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    #toggle-btn:hover { color: #89b4fa; }

    /* Inner content hidden when collapsed */
    #sidebar-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    #sidebar.collapsed #sidebar-inner { visibility: hidden; }

    #sidebar-inner h2 {
      padding: 10px 16px 6px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      flex-shrink: 0;
    }
    #device-list { flex: 1; overflow-y: auto; }

    /* ── Device cards ── */
    .device-card {
      padding: 10px 16px;
      border-bottom: 1px solid #181825;
      cursor: pointer;
      transition: background 0.15s;
    }
    .device-card:hover { background: #313244; }
    .device-name-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      gap: 6px;
    }
    .device-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #cba6f7;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edit-btn, .gpx-btn {
      background: none;
      border: none;
      color: #45475a;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 1px 3px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
    }
    .edit-btn:hover { color: #cba6f7; }
    .gpx-btn:hover { color: #a6e3a1; }
    .nickname-input {
      flex: 1;
      background: #181825;
      border: 1px solid #89b4fa;
      border-radius: 4px;
      color: #cba6f7;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 1px 6px;
      outline: none;
      min-width: 0;
    }
    .device-meta {
      font-size: 0.75rem;
      color: #6c7086;
      line-height: 1.6;
    }
    .device-meta span { margin-right: 8px; }
    /* Green dot shown next to each device name to indicate it is active */
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a6e3a1;
      flex-shrink: 0;
    }

    /* Connection status bar at the bottom of the sidebar */
    #status {
      padding: 10px 16px;
      font-size: 0.75rem;
      color: #6c7086;
      border-top: 1px solid #313244;
      flex-shrink: 0;
    }

    #map { flex: 1; }

    /* ── Log bar ── */
    #log-bar {
      height: 152px;
      background: #11111b;
      border-top: 2px solid #313244;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 0.72rem;
      color: #a6e3a1;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #log-bar .log-header {
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.65rem;
      margin-bottom: 4px;
    }
    #log-lines div { padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title">&#x1F4CD; Mapper <span class="version" id="version"></span></span>
        <button id="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">&#x25C0;</button>
      </div>
      <div id="sidebar-inner">
        <h2>Devices</h2>
        <!-- Device cards are injected here by updateSidebar() -->
        <div id="device-list"><div class="device-meta" style="padding:12px 16px">No devices yet</div></div>
        <div id="status">Connecting...</div>
      </div>
    </div>
    <div id="map"></div>
  </div>
  <div id="log-bar">
    <div class="log-header">Device log</div>
    <div id="log-lines"></div>
  </div>

  <!-- Leaflet JS — must load after the CSS above -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Version ──────────────────────────────────────────────────────────────
    fetch('/version')
      .then(r => r.json())
      .then(({ version }) => { document.getElementById('version').textContent = 'v' + version; });

    // ── Nickname server sync ──────────────────────────────────────────────────
    // Load server-persisted nicknames on startup (merges into localStorage copy)
    fetch('/nicknames')
      .then(r => r.json())
      .then(serverNicks => {
        Object.assign(nicknames, serverNicks);
        saveNicknames();
      });

    // ── Map ───────────────────────────────────────────────────────────────────
    const map = L.map('map').setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // Live Leaflet marker objects, keyed by deviceId
    const markers = {};
    // Leaflet polyline objects, keyed by deviceId
    const polylines = {};
    // Raw latlng arrays backing each polyline, keyed by deviceId
    const trackLatLngs = {};
    // Latest location data for each device, keyed by deviceId
    const deviceData = {};

    // Distinct colours cycled per device
    const TRACK_COLOURS = ['#f38ba8','#89b4fa','#a6e3a1','#fab387','#cba6f7','#f9e2af','#89dceb','#74c7ec'];
    let colourIdx = 0;
    const deviceColour = {};
    function getColour(id) {
      if (!deviceColour[id]) deviceColour[id] = TRACK_COLOURS[colourIdx++ % TRACK_COLOURS.length];
      return deviceColour[id];
    }
    // Nicknames stored in localStorage: { deviceId: nickname }
    const nicknames = JSON.parse(localStorage.getItem('mapper_nicknames') || '{}');

    function saveNicknames() {
      localStorage.setItem('mapper_nicknames', JSON.stringify(nicknames));
    }

    function getLabel(id) {
      return nicknames[id] || id;
    }

    // ── Sidebar toggle ────────────────────────────────────────────────────────
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('toggle-btn');
      sidebar.classList.toggle('collapsed');
      btn.innerHTML = sidebar.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
      // Notify Leaflet that the map container resized
      setTimeout(() => map.invalidateSize(), 230);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString();
    }

    // Returns "just now", "X min ago", or the absolute time if > 60 min old
    function relativeTime(ts) {
      const sec = Math.floor((Date.now() - ts) / 1000);
      if (sec < 30) return 'just now';
      if (sec < 3600) return `${Math.floor(sec / 60)} min ago`;
      return new Date(ts).toLocaleTimeString();
    }

    // ── Nickname editing ──────────────────────────────────────────────────────
    // Called when the edit pencil is clicked on a device card
    function startEdit(event, id) {
      event.stopPropagation(); // don't trigger focusDevice
      const row = document.getElementById('name-row-' + id);
      const current = nicknames[id] || '';
      row.innerHTML = `
        <span class="dot"></span>
        <input class="nickname-input" id="nick-input-${id}"
               value="${current}" placeholder="${id}" maxlength="32"
               onkeydown="handleNickKey(event,'${id}')"
               onblur="commitEdit('${id}')" />
      `;
      const input = document.getElementById('nick-input-' + id);
      input.focus();
      input.select();
    }

    function handleNickKey(event, id) {
      if (event.key === 'Enter') { event.target.blur(); }
      if (event.key === 'Escape') { event.target.dataset.cancel = '1'; event.target.blur(); }
    }

    function downloadGpx(event, id) {
      event.stopPropagation();
      const a = document.createElement('a');
      a.href = `/gpx/${encodeURIComponent(id)}`;
      a.download = '';
      a.click();
    }

    function commitEdit(id) {
      const input = document.getElementById('nick-input-' + id);
      if (!input || input.dataset.cancel === '1') { updateSidebar(); return; }
      const val = input.value.trim();
      if (val) { nicknames[id] = val; } else { delete nicknames[id]; }
      saveNicknames();
      updateSidebar();
      refreshPopup(id);
      // Persist to server so GPX filenames stay correct
      fetch('/nickname', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: id, nickname: val || null }),
      });
    }

    // ── Sidebar rendering ─────────────────────────────────────────────────────
    function updateSidebar() {
      const list = document.getElementById('device-list');
      const ids = Object.keys(deviceData);
      if (ids.length === 0) {
        list.innerHTML = '<div class="device-meta" style="padding:12px 16px">No devices yet</div>';
        return;
      }
      list.innerHTML = ids.map(id => {
        const d = deviceData[id];
        const label = getLabel(id);
        const batt = d.batt !== null ? `&#x1F50B; ${d.batt}%` : '';
        const spd  = d.spd  !== null ? `&#x1F3CE; ${(d.spd * 3.6).toFixed(1)} km/h` : '';
        const acc  = d.acc  !== null ? `&#x25CE; &plusmn;${d.acc}m` : '';
        const freshDot = isFresh(id) ? '#a6e3a1' : '#f38ba8';
        return `
          <div class="device-card" onclick="focusDevice('${id}')">
            <div class="device-name-row" id="name-row-${id}">
              <span class="dot" style="background:${freshDot}"></span>
              <span class="device-name">${label}</span>
              <button class="edit-btn" onclick="startEdit(event,'${id}')" title="Set nickname">&#x270F;</button>
              <button class="gpx-btn" onclick="downloadGpx(event,'${id}')" title="Download today&#39;s GPX">&#x21E9;</button>
            </div>
            <div class="device-meta">
              <span>${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</span><br>
              <span>${batt}</span><span>${spd}</span><span>${acc}</span><br>
              <span>&#x23F1; ${relativeTime(d.timestamp)}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── Map interactions ──────────────────────────────────────────────────────
    function focusDevice(id) {
      const d = deviceData[id];
      if (d) map.setView([d.lat, d.lon], 15);
    }

    function popupContent(data) {
      const id = data.deviceId;
      const label = getLabel(id);
      const nick = nicknames[id] ? `<span style="color:#888;font-weight:normal;font-size:0.85em">(${id})</span>` : '';
      return `
        <b>${label}</b> ${nick}<br>
        ${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}<br>
        ${data.acc  !== null ? `Accuracy: &plusmn;${data.acc}m<br>` : ''}
        ${data.batt !== null ? `Battery: ${data.batt}%<br>` : ''}
        ${data.spd  !== null ? `Speed: ${(data.spd * 3.6).toFixed(1)} km/h<br>` : ''}
        ${data.alt  !== null ? `Alt: ${data.alt}m<br>` : ''}
        <small>${formatTime(data.timestamp)}</small>
      `;
    }

    function refreshPopup(id) {
      if (markers[id] && markers[id].isPopupOpen()) {
        markers[id].setPopupContent(popupContent(deviceData[id]));
      }
    }

    // ── Freshness ─────────────────────────────────────────────────────────────
    const FRESH_MS = 5 * 60 * 1000; // 5 minutes
    function isFresh(id) {
      const d = deviceData[id];
      return d && (Date.now() - d.timestamp) < FRESH_MS;
    }

    // ── Live marker icon (green = fresh, red = stale) ─────────────────────────
    function liveIcon(id) {
      const colour = isFresh(id) ? '#a6e3a1' : '#f38ba8';
      return L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:${colour};border:2.5px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.5)"></div>`,
        iconSize: [16, 16],
        iconAnchor: [8, 8],
        popupAnchor: [0, -10],
      });
    }

    function updateMarkerColour(id) {
      if (markers[id]) markers[id].setIcon(liveIcon(id));
    }

    // ── Track polylines, history dots & accuracy circles ──────────────────────
    // dotMarkers[id]      = array of L.circleMarker (one per historical position)
    // accCircles[id]      = array of L.circle for historical accuracy rings
    // liveAccCircle[id]   = single L.circle for the current position accuracy
    const dotMarkers = {};
    const accCircles = {};
    const liveAccCircle = {};

    function ensurePolyline(id) {
      if (!polylines[id]) {
        trackLatLngs[id] = [];
        polylines[id] = L.polyline([], {
          color: getColour(id),
          weight: 3,
          opacity: 0.75,
        }).addTo(map);
        dotMarkers[id] = [];
        accCircles[id] = [];
      }
    }

    function addDot(id, lat, lon, isoTime, acc) {
      const colour = getColour(id);
      // Accuracy ring — radius in metres, projects correctly on the map
      if (acc != null && acc > 0) {
        const ring = L.circle([lat, lon], {
          radius: acc,
          color: colour,
          fillColor: colour,
          fillOpacity: 0.07,
          weight: 1,
          opacity: 0.35,
          interactive: false,
        }).addTo(map);
        accCircles[id].push(ring);
      }
      // Position dot
      const dot = L.circleMarker([lat, lon], {
        radius: 4,
        color: colour,
        fillColor: colour,
        fillOpacity: 0.85,
        weight: 1,
      }).bindPopup(
        `<b>${getLabel(id)}</b><br>${lat.toFixed(5)}, ${lon.toFixed(5)}<br>`+
        (acc != null ? `Accuracy: &plusmn;${acc}m<br>` : '') +
        `<small>${new Date(isoTime).toLocaleTimeString()}</small>`,
        { maxWidth: 180 }
      ).addTo(map);
      dotMarkers[id].push(dot);
    }

    function clearDots(id) {
      (dotMarkers[id] || []).forEach(d => d.remove());
      (accCircles[id]  || []).forEach(c => c.remove());
      dotMarkers[id] = [];
      accCircles[id]  = [];
    }

    // Update the single accuracy circle shown under the live marker
    function updateLiveAccCircle(id, lat, lon, acc) {
      if (liveAccCircle[id]) { liveAccCircle[id].remove(); delete liveAccCircle[id]; }
      if (acc != null && acc > 0) {
        liveAccCircle[id] = L.circle([lat, lon], {
          radius: acc,
          color: getColour(id),
          fillColor: getColour(id),
          fillOpacity: 0.12,
          weight: 1.5,
          opacity: 0.5,
          interactive: false,
        }).addTo(map);
        // Keep circle beneath the marker
        liveAccCircle[id].bringToBack();
      }
    }

    // Load a full track (array of {lat, lon, time, acc}) for a device
    function loadTrack(id, points) {
      ensurePolyline(id);
      clearDots(id);
      trackLatLngs[id] = points.map(p => [p.lat, p.lon]);
      polylines[id].setLatLngs(trackLatLngs[id]);
      points.forEach(p => addDot(id, p.lat, p.lon, p.time, p.acc));
    }

    // Single new point broadcast on each update
    function onTrackpoint(data) {
      ensurePolyline(data.deviceId);
      trackLatLngs[data.deviceId].push([data.lat, data.lon]);
      polylines[data.deviceId].setLatLngs(trackLatLngs[data.deviceId]);
      addDot(data.deviceId, data.lat, data.lon, data.time, data.acc);
    }

    // ── Location updates ──────────────────────────────────────────────────────
    function onLocation(data) {
      deviceData[data.deviceId] = data;
      const id = data.deviceId;

      if (markers[id]) {
        markers[id].setLatLng([data.lat, data.lon]);
        markers[id].setIcon(liveIcon(id));
        if (markers[id].isPopupOpen()) markers[id].setPopupContent(popupContent(data));
      } else {
        markers[id] = L.marker([data.lat, data.lon], { icon: liveIcon(id) })
          .bindPopup(popupContent(data))
          .addTo(map);
        if (Object.keys(deviceData).length === 1) map.setView([data.lat, data.lon], 14);
      }

      updateLiveAccCircle(id, data.lat, data.lon, data.acc);
      updateSidebar();
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        document.getElementById('status').textContent = 'Connected';
        // Load today's full track via REST now that the connection is up.
        // Doing this in onopen (rather than at page load) ensures the server
        // has finished its preload and the in-memory trackpoints are ready.
        fetch('/tracks')
          .then(r => r.json())
          .then(allTracks => {
            Object.entries(allTracks).forEach(([id, points]) => loadTrack(id, points));
          });
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'location') onLocation(data);
        if (data.type === 'log') addLog(data.message);
        if (data.type === 'trackpoint') onTrackpoint(data);
      };

      ws.onclose = () => {
        document.getElementById('status').textContent = 'Disconnected — retrying...';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    // ── Log bar ───────────────────────────────────────────────────────────────
    const logLines = [];
    function addLog(message) {
      logLines.push(message);
      if (logLines.length > 10) logLines.shift();
      const el = document.getElementById('log-lines');
      el.innerHTML = logLines.map(l => `<div>${l}</div>`).join('');
      el.scrollTop = el.scrollHeight;
    }

    // Refresh sidebar and marker colours every minute
    setInterval(() => {
      updateSidebar();
      Object.keys(deviceData).forEach(updateMarkerColour);
    }, 60000);

    connect();
  </script>
</body>
</html>
