<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapper</title>
  <!-- Leaflet CSS — required for map tiles and controls to render correctly -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /*
     * Full-height column layout:
     *   body (column)
     *     #main (row, flex:1)        — sidebar + map side by side
     *     #log-bar (fixed height)    — update log pinned at the bottom
     */
    body  { display: flex; flex-direction: column; height: 100vh; font-family: sans-serif; }
    #main { display: flex; flex: 1; min-height: 0; }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */

    #sidebar {
      width: 260px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      /* Smooth collapse/expand animation */
      transition: width 0.22s ease;
      overflow: hidden;
    }
    /* Collapsed sidebar shows only the toggle arrow */
    #sidebar.collapsed { width: 36px; }

    /* Header row: app title on the left, collapse button on the right */
    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 16px;
      min-height: 48px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    #sidebar-title {
      font-size: 1.1rem;
      color: #89b4fa;
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
    }
    /* Small grey version number shown next to the title */
    #sidebar-title .version {
      font-size: 0.65rem;
      color: #6c7086;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* Arrow button that collapses/expands the sidebar */
    #toggle-btn {
      background: none;
      border: none;
      color: #6c7086;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 4px 2px;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    #toggle-btn:hover { color: #89b4fa; }

    /*
     * #sidebar-inner wraps the device list and status bar.
     * It is hidden (visibility:hidden) when collapsed so the toggle button
     * remains clickable but no content leaks into the narrow rail.
     */
    #sidebar-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    #sidebar.collapsed #sidebar-inner { visibility: hidden; }

    #sidebar-inner h2 {
      padding: 10px 16px 6px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      flex-shrink: 0;
    }

    /* Device list scrolls if there are more cards than the sidebar can show */
    #device-list { flex: 1; overflow-y: auto; }

    /* ── Device cards ─────────────────────────────────────────────────────────── */

    .device-card {
      padding: 10px 16px;
      border-bottom: 1px solid #181825;
      cursor: pointer;          /* clicking the card pans the map to that device */
      transition: background 0.15s;
    }
    .device-card:hover { background: #313244; }

    /* Top row of a card: status dot · name · edit pencil · GPX download */
    .device-name-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      gap: 6px;
    }
    .device-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #cba6f7;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Small icon buttons (pencil = edit nickname, ⇩ = download GPX) */
    .edit-btn, .gpx-btn {
      background: none;
      border: none;
      color: #45475a;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 1px 3px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: color 0.15s;
      line-height: 1;
    }
    .edit-btn:hover { color: #cba6f7; }
    .gpx-btn:hover  { color: #a6e3a1; }

    /* Inline text input that appears when editing a nickname */
    .nickname-input {
      flex: 1;
      background: #181825;
      border: 1px solid #89b4fa;
      border-radius: 4px;
      color: #cba6f7;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 1px 6px;
      outline: none;
      min-width: 0;
    }

    /* Secondary device info: coords, battery, speed, accuracy, timestamp */
    .device-meta { font-size: 0.75rem; color: #6c7086; line-height: 1.6; }
    .device-meta span { margin-right: 8px; }

    /*
     * Status dot shown next to the device name.
     * Colour is set dynamically via inline style:
     *   green (#a6e3a1) = last update within 5 minutes
     *   red   (#f38ba8) = last update more than 5 minutes ago
     */
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a6e3a1; /* default; overridden per-card in updateSidebar() */
      flex-shrink: 0;
    }

    /* Connection status line at the bottom of the sidebar */
    #status {
      padding: 10px 16px;
      font-size: 0.75rem;
      color: #6c7086;
      border-top: 1px solid #313244;
      flex-shrink: 0;
    }

    /* Map fills all remaining horizontal space */
    #map { flex: 1; }

    /* ── Log bar ──────────────────────────────────────────────────────────────── */
    /*
     * Fixed-height monospace panel at the very bottom of the viewport.
     * Shows the last 10 device update log lines, newest at the bottom.
     * Text is green-on-dark to look like a terminal.
     */
    #log-bar {
      height: 152px;
      background: #11111b;
      border-top: 2px solid #313244;
      padding: 6px 12px;
      font-family: monospace;
      font-size: 0.72rem;
      color: #a6e3a1;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #log-bar .log-header {
      color: #6c7086;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.65rem;
      margin-bottom: 4px;
    }
    /* Truncate long lines rather than wrapping (keeps rows clean) */
    #log-lines div {
      padding: 1px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <!-- Main row: sidebar on the left, Leaflet map on the right -->
  <div id="main">
    <div id="sidebar">
      <!-- Header: app title with version + collapse button -->
      <div id="sidebar-header">
        <span id="sidebar-title">&#x1F4CD; Mapper <span class="version" id="version"></span></span>
        <button id="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">&#x25C0;</button>
      </div>
      <div id="sidebar-inner">
        <h2>Devices</h2>
        <!-- Device cards injected by updateSidebar() -->
        <div id="device-list">
          <div class="device-meta" style="padding:12px 16px">No devices yet</div>
        </div>
        <!-- WebSocket connection status -->
        <div id="status">Connecting...</div>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <!-- Log bar: last 10 GPS update lines from the server -->
  <div id="log-bar">
    <div class="log-header">Device log</div>
    <div id="log-lines"></div>
  </div>

  <!-- Leaflet JS — must load after the CSS above -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Version display ───────────────────────────────────────────────────────
    // Fetch the version string from the server and show it in the header.
    // The version is stored in package.json and served via GET /version.
    fetch('/version')
      .then(r => r.json())
      .then(({ version }) => {
        document.getElementById('version').textContent = 'v' + version;
      });

    // ── Map initialisation ────────────────────────────────────────────────────
    // Start zoomed out to show the whole world; the map auto-pans to the first
    // device that appears.
    const map = L.map('map').setView([20, 0], 2);

    // OpenStreetMap tiles — free, no API key required
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    // ── Shared state ──────────────────────────────────────────────────────────

    // Live Leaflet marker objects for each device's current position
    // { deviceId: L.Marker }
    const markers = {};

    // Leaflet polyline for each device's track (the line connecting all positions)
    // { deviceId: L.Polyline }
    const polylines = {};

    // Raw [lat, lon] array that backs each polyline — kept in sync with the
    // polyline so we can append new points without rebuilding from scratch
    // { deviceId: [[lat, lon], …] }
    const trackLatLngs = {};

    // Most recent location data received from the server for each device
    // { deviceId: { deviceId, lat, lon, acc, batt, spd, alt, timestamp } }
    const deviceData = {};

    // ── Colour assignment ─────────────────────────────────────────────────────
    // Each device gets a distinct colour from this palette, assigned on first
    // encounter and kept consistent for the whole session.
    const TRACK_COLOURS = [
      '#f38ba8', // red
      '#89b4fa', // blue
      '#a6e3a1', // green
      '#fab387', // orange
      '#cba6f7', // purple
      '#f9e2af', // yellow
      '#89dceb', // cyan
      '#74c7ec', // sky
    ];
    let colourIdx = 0;
    const deviceColour = {};

    // Returns the assigned colour for a device, allocating one if needed
    function getColour(id) {
      if (!deviceColour[id]) {
        deviceColour[id] = TRACK_COLOURS[colourIdx++ % TRACK_COLOURS.length];
      }
      return deviceColour[id];
    }

    // ── Nicknames ─────────────────────────────────────────────────────────────
    // Nicknames are stored in two places:
    //   1. localStorage — survives page reloads in the same browser
    //   2. Server's nicknames.json — survives server restarts and syncs across browsers
    // On load we merge both, with the server copy taking precedence.
    const nicknames = JSON.parse(localStorage.getItem('mapper_nicknames') || '{}');

    // Persist the current nickname map to localStorage
    function saveNicknames() {
      localStorage.setItem('mapper_nicknames', JSON.stringify(nicknames));
    }

    // Returns the nickname for a device, or the raw device ID if none is set
    function getLabel(id) {
      return nicknames[id] || id;
    }

    // Merge server-persisted nicknames into the local copy on page load.
    // Runs in parallel with the map setup — order doesn't matter here.
    fetch('/nicknames')
      .then(r => r.json())
      .then(serverNicks => {
        Object.assign(nicknames, serverNicks); // server wins on conflicts
        saveNicknames();
      });

    // ── Sidebar collapse / expand ─────────────────────────────────────────────
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const btn     = document.getElementById('toggle-btn');
      sidebar.classList.toggle('collapsed');
      // Flip the arrow direction to indicate the current state
      btn.innerHTML = sidebar.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
      // Tell Leaflet the map container changed size so it redraws tiles correctly
      setTimeout(() => map.invalidateSize(), 230); // wait for CSS transition to finish
    }

    // ── Time formatting ───────────────────────────────────────────────────────

    // Returns an absolute HH:MM:SS string (used in popups)
    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString();
    }

    // Returns a human-friendly relative string for the sidebar:
    //   < 30 s  → "just now"
    //   < 60 m  → "X min ago"
    //   older   → absolute time (HH:MM:SS)
    function relativeTime(ts) {
      const sec = Math.floor((Date.now() - ts) / 1000);
      if (sec < 30)   return 'just now';
      if (sec < 3600) return `${Math.floor(sec / 60)} min ago`;
      return new Date(ts).toLocaleTimeString();
    }

    // ── Freshness ─────────────────────────────────────────────────────────────
    // A device is considered "fresh" if its last update arrived within 5 minutes.
    // Fresh = green marker/dot.  Stale = red marker/dot.
    const FRESH_MS = 5 * 60 * 1000; // 5 minutes in milliseconds

    function isFresh(id) {
      const d = deviceData[id];
      return d && (Date.now() - d.timestamp) < FRESH_MS;
    }

    // ── Live marker icon ──────────────────────────────────────────────────────
    // Replaces the default Leaflet pin with a small filled circle.
    // Colour encodes freshness: green = fresh, red = stale.
    function liveIcon(id) {
      const colour = isFresh(id) ? '#a6e3a1' : '#f38ba8';
      return L.divIcon({
        className: '', // suppress Leaflet's default white box
        html: `<div style="
          width:16px; height:16px;
          border-radius:50%;
          background:${colour};
          border:2.5px solid white;
          box-shadow:0 1px 5px rgba(0,0,0,0.5)
        "></div>`,
        iconSize:    [16, 16],
        iconAnchor:  [8, 8],   // centre of the circle sits on the coordinate
        popupAnchor: [0, -10], // popup appears just above the circle
      });
    }

    // Re-applies the current freshness colour to an existing live marker
    function updateMarkerColour(id) {
      if (markers[id]) markers[id].setIcon(liveIcon(id));
    }

    // ── Nickname editing ──────────────────────────────────────────────────────

    // Replaces the device name row with an inline text input when the pencil is clicked
    function startEdit(event, id) {
      event.stopPropagation(); // prevent the click from also triggering focusDevice()
      const row     = document.getElementById('name-row-' + id);
      const current = nicknames[id] || '';
      row.innerHTML = `
        <span class="dot"></span>
        <input class="nickname-input" id="nick-input-${id}"
               value="${current}" placeholder="${id}" maxlength="32"
               onkeydown="handleNickKey(event,'${id}')"
               onblur="commitEdit('${id}')" />
      `;
      const input = document.getElementById('nick-input-' + id);
      input.focus();
      input.select(); // pre-select existing text so the user can type straight away
    }

    // Keyboard shortcuts while the nickname input is focused:
    //   Enter  → confirm (triggers blur → commitEdit)
    //   Escape → cancel  (marks the input then triggers blur → commitEdit bails out)
    function handleNickKey(event, id) {
      if (event.key === 'Enter')  { event.target.blur(); }
      if (event.key === 'Escape') { event.target.dataset.cancel = '1'; event.target.blur(); }
    }

    // Saves the edited nickname and syncs it to the server.
    // Called by the input's onblur event (after Enter, Escape, or clicking away).
    function commitEdit(id) {
      const input = document.getElementById('nick-input-' + id);
      if (!input || input.dataset.cancel === '1') {
        updateSidebar(); // restore the card without saving
        return;
      }
      const val = input.value.trim();
      if (val) { nicknames[id] = val; } else { delete nicknames[id]; }
      saveNicknames();     // persist to localStorage
      updateSidebar();     // re-render the card with the new name
      refreshPopup(id);    // update the open popup if the marker is clicked

      // Persist to the server so GPX filenames and other browsers stay in sync
      fetch('/nickname', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ deviceId: id, nickname: val || null }),
      });
    }

    // Triggers a file download of today's GPX track for a device.
    // The server responds to GET /gpx/:deviceId with the file attachment.
    function downloadGpx(event, id) {
      event.stopPropagation(); // don't focus the device on the map
      const a  = document.createElement('a');
      a.href   = `/gpx/${encodeURIComponent(id)}`;
      a.download = ''; // use the server-provided filename from Content-Disposition
      a.click();
    }

    // ── Sidebar rendering ─────────────────────────────────────────────────────
    // Rebuilds the device list from scratch using the latest deviceData state.
    // Called on every location update and every minute (for relative timestamps).
    function updateSidebar() {
      const list = document.getElementById('device-list');
      const ids  = Object.keys(deviceData);

      if (ids.length === 0) {
        list.innerHTML = '<div class="device-meta" style="padding:12px 16px">No devices yet</div>';
        return;
      }

      list.innerHTML = ids.map(id => {
        const d = deviceData[id];

        // Only show fields that the server actually sent (null = not available)
        const batt = d.batt !== null ? `&#x1F50B; ${d.batt}%` : '';
        const spd  = d.spd  !== null ? `&#x1F3CE; ${(d.spd * 3.6).toFixed(1)} km/h` : '';
        const acc  = d.acc  !== null ? `&#x25CE; &plusmn;${d.acc}m` : '';

        // Status dot colour reflects whether the device has pinged recently
        const freshDot = isFresh(id) ? '#a6e3a1' : '#f38ba8';

        return `
          <div class="device-card" onclick="focusDevice('${id}')">
            <div class="device-name-row" id="name-row-${id}">
              <span class="dot" style="background:${freshDot}"></span>
              <span class="device-name">${getLabel(id)}</span>
              <button class="edit-btn"
                      onclick="startEdit(event,'${id}')"
                      title="Set nickname">&#x270F;</button>
              <button class="gpx-btn"
                      onclick="downloadGpx(event,'${id}')"
                      title="Download today&#39;s GPX">&#x21E9;</button>
            </div>
            <div class="device-meta">
              <span>${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</span><br>
              <span>${batt}</span><span>${spd}</span><span>${acc}</span><br>
              <span>&#x23F1; ${relativeTime(d.timestamp)}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── Map interactions ──────────────────────────────────────────────────────

    // Pans and zooms to a device when its sidebar card is clicked
    function focusDevice(id) {
      const d = deviceData[id];
      if (d) map.setView([d.lat, d.lon], 15);
    }

    // Builds the HTML content for a device's map marker popup
    function popupContent(data) {
      const id    = data.deviceId;
      const label = getLabel(id);
      // Show the raw device ID in small text next to the nickname (if set)
      const nick  = nicknames[id]
        ? `<span style="color:#888;font-weight:normal;font-size:0.85em">(${id})</span>`
        : '';
      return `
        <b>${label}</b> ${nick}<br>
        ${data.lat.toFixed(5)}, ${data.lon.toFixed(5)}<br>
        ${data.acc  !== null ? `Accuracy: &plusmn;${data.acc}m<br>` : ''}
        ${data.batt !== null ? `Battery: ${data.batt}%<br>` : ''}
        ${data.spd  !== null ? `Speed: ${(data.spd * 3.6).toFixed(1)} km/h<br>` : ''}
        ${data.alt  !== null ? `Alt: ${data.alt}m<br>` : ''}
        <small>${formatTime(data.timestamp)}</small>
      `;
    }

    // Re-renders a marker's popup if it is currently open (e.g. after a nickname change)
    function refreshPopup(id) {
      if (markers[id] && markers[id].isPopupOpen()) {
        markers[id].setPopupContent(popupContent(deviceData[id]));
      }
    }

    // ── Track polylines, history dots & accuracy circles ──────────────────────
    //
    // For each device there are several overlapping Leaflet layers:
    //
    //   polylines[id]       — thin coloured line connecting all positions in order
    //   dotMarkers[id][]    — small filled circles at each historical position
    //   accCircles[id][]    — transparent rings showing GPS accuracy at each point
    //   liveAccCircle[id]   — a single larger accuracy ring under the live marker
    //   markers[id]         — the live position marker (green/red circle)

    const dotMarkers    = {}; // { deviceId: [L.CircleMarker, …] }
    const accCircles    = {}; // { deviceId: [L.Circle, …] }
    const liveAccCircle = {}; // { deviceId: L.Circle }

    // Creates the polyline and initialises the dot/circle arrays for a device
    // on its first appearance. Safe to call multiple times (idempotent).
    function ensurePolyline(id) {
      if (!polylines[id]) {
        trackLatLngs[id] = [];
        polylines[id]    = L.polyline([], {
          color:   getColour(id),
          weight:  3,
          opacity: 0.75,
        }).addTo(map);
        dotMarkers[id] = [];
        accCircles[id] = [];
      }
    }

    // Adds a single historical position dot and its accuracy ring to the map.
    // Used both when loading the full day's history and for each new live point.
    function addDot(id, lat, lon, isoTime, acc) {
      const colour = getColour(id);

      // Accuracy ring — L.circle radius is in metres, so it scales with zoom.
      // Rendered as a very faint transparent fill so it doesn't obscure the map.
      if (acc != null && acc > 0) {
        const ring = L.circle([lat, lon], {
          radius:      acc,
          color:       colour,
          fillColor:   colour,
          fillOpacity: 0.07,
          weight:      1,
          opacity:     0.35,
          interactive: false, // ignore mouse events — clicking through to dots/map
        }).addTo(map);
        accCircles[id].push(ring);
      }

      // Small filled circle marking the exact recorded position
      const dot = L.circleMarker([lat, lon], {
        radius:      4,
        color:       colour,
        fillColor:   colour,
        fillOpacity: 0.85,
        weight:      1,
      }).bindPopup(
        `<b>${getLabel(id)}</b><br>` +
        `${lat.toFixed(5)}, ${lon.toFixed(5)}<br>` +
        (acc != null ? `Accuracy: &plusmn;${acc}m<br>` : '') +
        `<small>${new Date(isoTime).toLocaleTimeString()}</small>`,
        { maxWidth: 180 }
      ).addTo(map);

      dotMarkers[id].push(dot);
    }

    // Removes all historical dots and accuracy rings for a device from the map.
    // Called before re-loading a full track to avoid duplicates.
    function clearDots(id) {
      (dotMarkers[id] || []).forEach(d => d.remove());
      (accCircles[id]  || []).forEach(c => c.remove());
      dotMarkers[id] = [];
      accCircles[id]  = [];
    }

    // Updates the accuracy circle displayed under the live position marker.
    // A new circle is created on each location update (radius may change).
    function updateLiveAccCircle(id, lat, lon, acc) {
      // Remove the old circle first
      if (liveAccCircle[id]) { liveAccCircle[id].remove(); delete liveAccCircle[id]; }

      if (acc != null && acc > 0) {
        liveAccCircle[id] = L.circle([lat, lon], {
          radius:      acc,
          color:       getColour(id),
          fillColor:   getColour(id),
          fillOpacity: 0.12, // slightly more visible than historical rings
          weight:      1.5,
          opacity:     0.5,
          interactive: false,
        }).addTo(map);
        // Push the circle below other layers so the marker stays clickable
        liveAccCircle[id].bringToBack();
      }
    }

    // Loads (or reloads) a complete set of track points for a device.
    // Clears existing dots first to avoid duplicates when the page reconnects.
    // points: [{ lat, lon, time, acc }, …]
    function loadTrack(id, points) {
      ensurePolyline(id);
      clearDots(id);
      trackLatLngs[id] = points.map(p => [p.lat, p.lon]);
      polylines[id].setLatLngs(trackLatLngs[id]);
      points.forEach(p => addDot(id, p.lat, p.lon, p.time, p.acc));
    }

    // Appends a single new trackpoint received live from the server.
    // Extends the polyline and adds a new dot without redrawing from scratch.
    function onTrackpoint(data) {
      ensurePolyline(data.deviceId);
      trackLatLngs[data.deviceId].push([data.lat, data.lon]);
      polylines[data.deviceId].setLatLngs(trackLatLngs[data.deviceId]);
      addDot(data.deviceId, data.lat, data.lon, data.time, data.acc);
    }

    // ── Live location update ──────────────────────────────────────────────────
    // Handles a 'location' WebSocket message — moves or creates the live marker
    // for the device and refreshes the sidebar.
    function onLocation(data) {
      deviceData[data.deviceId] = data; // store latest state
      const id = data.deviceId;

      if (markers[id]) {
        // Device already has a marker — move it to the new position
        markers[id].setLatLng([data.lat, data.lon]);
        markers[id].setIcon(liveIcon(id)); // refresh colour (freshness may have changed)
        if (markers[id].isPopupOpen()) markers[id].setPopupContent(popupContent(data));
      } else {
        // First time seeing this device — create a marker
        markers[id] = L.marker([data.lat, data.lon], { icon: liveIcon(id) })
          .bindPopup(popupContent(data))
          .addTo(map);
        // Auto-pan to the very first device only; don't hijack the view for subsequent ones
        if (Object.keys(deviceData).length === 1) map.setView([data.lat, data.lon], 14);
      }

      updateLiveAccCircle(id, data.lat, data.lon, data.acc);
      updateSidebar();
    }

    // ── WebSocket connection ──────────────────────────────────────────────────
    // Maintains a persistent WebSocket to the server for real-time updates.
    // Automatically reconnects after 3 seconds if the connection drops,
    // preserving all existing map markers and track lines during the gap.
    function connect() {
      // Use wss:// (secure) when the page is served over HTTPS
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws    = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        document.getElementById('status').textContent = 'Connected';
        // Tracks are now pushed by the server via 'track' messages on every connect,
        // so no separate HTTP fetch is needed here.
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'location')   onLocation(data);               // live device position
        if (data.type === 'trackpoint') onTrackpoint(data);             // new point appended live
        if (data.type === 'track')      loadTrack(data.deviceId, data.points); // full day history
        if (data.type === 'log')        addLog(data.message);           // update log entry
      };

      ws.onclose = () => {
        document.getElementById('status').textContent = 'Disconnected \u2014 retrying...';
        // Retry after 3 s; existing markers remain visible during the gap
        setTimeout(connect, 3000);
      };

      // Treat socket errors as a close so the retry logic kicks in
      ws.onerror = () => ws.close();
    }

    // ── Log bar ───────────────────────────────────────────────────────────────
    // Maintains a rolling window of the last 10 log lines in the bottom bar.
    const logLines = [];

    function addLog(message) {
      logLines.push(message);
      if (logLines.length > 10) logLines.shift(); // keep only the last 10
      const el = document.getElementById('log-lines');
      el.innerHTML = logLines.map(l => `<div>${l}</div>`).join('');
      el.scrollTop = el.scrollHeight; // auto-scroll to the newest line
    }

    // ── Periodic refresh ──────────────────────────────────────────────────────
    // Re-renders the sidebar every minute so relative timestamps ("2 min ago")
    // stay accurate, and updates marker colours in case a device has gone stale.
    setInterval(() => {
      updateSidebar();
      Object.keys(deviceData).forEach(updateMarkerColour);
    }, 60000);

    // Kick off the WebSocket connection.
    // The server pushes 'location', 'track', and 'log' messages on connect, so
    // the map is fully populated as soon as the WebSocket handshake completes —
    // no separate HTTP fetch needed.
    connect();
  </script>
</body>
</html>
